<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Air Traffic Management Quiz</title>
  <style>
    :root{
      --bg:#0f0d0b;
      --panel:#171411;
      --panel-2:#201b17;
      --gold:#d4af37;
      --gold-soft:#f2df9b;
      --text:#f8f2e7;
      --muted:#cbbda6;
      --line:rgba(212,175,55,.22);
      --ok:#87d39a;
      --bad:#ff8f8f;
      --shadow:0 18px 50px rgba(0,0,0,.35);
      --radius:24px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: "Inter", "SF Pro Display", "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(212,175,55,.12), transparent 28%),
        radial-gradient(circle at top left, rgba(255,255,255,.04), transparent 20%),
        linear-gradient(180deg, #120f0d 0%, #0c0a09 100%);
      color:var(--text);
      min-height:100vh;
    }

    .wrap{
      width:min(1120px, calc(100% - 32px));
      margin:32px auto 56px;
    }

    .hero{
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
      border:1px solid var(--line);
      border-radius:32px;
      padding:28px;
      box-shadow:var(--shadow);
      position:sticky;
      top:16px;
      z-index:20;
      backdrop-filter: blur(12px);
    }

    .eyebrow{
      color:var(--gold-soft);
      letter-spacing:.18em;
      text-transform:uppercase;
      font-size:12px;
      margin-bottom:10px;
    }

    .title{
      font-size:clamp(26px, 4vw, 42px);
      line-height:1.08;
      margin:0 0 10px;
      font-weight:800;
    }

    .subtitle{
      color:var(--muted);
      margin:0 0 18px;
      font-size:15px;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:14px;
    }

    .stat{
      background:linear-gradient(180deg, rgba(212,175,55,.08), rgba(255,255,255,.02));
      border:1px solid var(--line);
      border-radius:20px;
      padding:16px 18px;
    }

    .stat .label{
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    .stat .value{
      font-size:26px;
      font-weight:800;
      color:var(--gold-soft);
    }

    .quiz{
      margin-top:24px;
      display:grid;
      gap:18px;
    }

    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.028), rgba(255,255,255,.015));
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .card-head{
      padding:20px 22px 8px;
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:flex-start;
    }

    .qno{
      font-size:13px;
      color:var(--gold-soft);
      letter-spacing:.1em;
      text-transform:uppercase;
      font-weight:700;
      margin-bottom:8px;
    }

    .qtext{
      font-size:20px;
      line-height:1.5;
      margin:0;
      font-weight:700;
    }

    .point-badge{
      white-space:nowrap;
      border:1px solid var(--line);
      background:rgba(212,175,55,.08);
      color:var(--gold-soft);
      padding:10px 14px;
      border-radius:999px;
      font-size:14px;
      font-weight:700;
    }

    .choices{
      padding:16px 22px 22px;
      display:grid;
      gap:12px;
    }

    .choice{
      position:relative;
    }

    .choice input{
      position:absolute;
      opacity:0;
      pointer-events:none;
    }

    .choice label{
      display:flex;
      gap:14px;
      align-items:flex-start;
      padding:16px 18px;
      border:1px solid rgba(255,255,255,.09);
      border-radius:18px;
      background:rgba(255,255,255,.02);
      cursor:pointer;
      transition:.2s ease;
      min-height:64px;
    }

    .choice label:hover{
      transform:translateY(-1px);
      border-color:rgba(212,175,55,.45);
      background:rgba(212,175,55,.06);
    }

    .choice input:checked + label{
      border-color:rgba(212,175,55,.7);
      background:rgba(212,175,55,.1);
      box-shadow:inset 0 0 0 1px rgba(212,175,55,.2);
    }

    .letter{
      width:34px;
      height:34px;
      border-radius:50%;
      background:linear-gradient(180deg, rgba(212,175,55,.22), rgba(212,175,55,.08));
      border:1px solid rgba(212,175,55,.35);
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--gold-soft);
      font-weight:800;
      flex:0 0 34px;
    }

    .choice-text{
      font-size:16px;
      line-height:1.45;
      color:var(--text);
    }

    .action-row{
      padding:0 22px 22px;
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      align-items:center;
    }

    button{
      border:none;
      cursor:pointer;
      border-radius:16px;
      padding:13px 18px;
      font-size:15px;
      font-weight:700;
      transition:.2s ease;
    }

    .primary{
      background:linear-gradient(180deg, #ecd27b, #c89c28);
      color:#1b1407;
      box-shadow:0 10px 24px rgba(200,156,40,.28);
    }

    .primary:hover{transform:translateY(-1px)}
    .secondary{
      background:rgba(255,255,255,.05);
      color:var(--text);
      border:1px solid rgba(255,255,255,.08);
    }

    .secondary:hover{
      background:rgba(255,255,255,.08);
    }

    .result{
      margin:0 22px 22px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.03);
      padding:16px 18px;
      display:none;
    }

    .result.show{display:block}
    .result.correct{
      border-color:rgba(135,211,154,.45);
      background:rgba(135,211,154,.09);
    }
    .result.wrong{
      border-color:rgba(255,143,143,.35);
      background:rgba(255,143,143,.08);
    }

    .result-title{
      font-size:18px;
      font-weight:800;
      margin:0 0 8px;
    }

    .score-line{
      font-size:15px;
      font-weight:700;
      margin-bottom:8px;
    }

    .explain{
      color:#f3ead7;
      line-height:1.6;
      font-size:15px;
    }

    .answer-line{
      margin-top:8px;
      color:var(--gold-soft);
      font-weight:700;
      font-size:14px;
    }

    .footer-actions{
      display:flex;
      justify-content:center;
      gap:12px;
      margin-top:24px;
    }

    .finish-panel{
      margin-top:24px;
      background:linear-gradient(180deg, rgba(212,175,55,.08), rgba(255,255,255,.02));
      border:1px solid var(--line);
      border-radius:28px;
      padding:24px;
      box-shadow:var(--shadow);
      display:none;
    }

    .finish-panel.show{display:block}

    .finish-title{
      margin:0 0 8px;
      font-size:28px;
    }

    .finish-text{
      margin:0;
      color:var(--muted);
      font-size:16px;
      line-height:1.6;
    }

    @media (max-width: 820px){
      .stats{grid-template-columns:repeat(2,minmax(0,1fr))}
      .card-head{flex-direction:column}
      .point-badge{align-self:flex-start}
    }

    @media (max-width: 520px){
      .wrap{width:min(100% - 16px, 1120px); margin:16px auto 40px}
      .hero{padding:22px}
      .stats{grid-template-columns:1fr}
      .choice label{padding:14px}
      .qtext{font-size:18px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="eyebrow">Luxury Quiz Interface</div>
      <h1 class="title">Air Traffic Management Quiz</h1>
      <p class="subtitle">ตอบทีละข้อได้เลย ระบบจะเช็กคะแนนรายข้อทันที พร้อมอธิบายเหตุผลของคำตอบ</p>
      <div class="stats">
        <div class="stat">
          <div class="label">Total Score</div>
          <div class="value"><span id="totalScore">0</span> / 20</div>
        </div>
        <div class="stat">
          <div class="label">Answered</div>
          <div class="value"><span id="answeredCount">0</span> / 20</div>
        </div>
        <div class="stat">
          <div class="label">Correct</div>
          <div class="value"><span id="correctCount">0</span></div>
        </div>
        <div class="stat">
          <div class="label">Accuracy</div>
          <div class="value"><span id="accuracy">0%</span></div>
        </div>
      </div>
    </section>

    <main class="quiz" id="quiz"></main>

    <div class="footer-actions">
      <button class="secondary" onclick="expandAll()">แสดงเฉลยทั้งหมด</button>
      <button class="secondary" onclick="resetQuiz()">เริ่มใหม่</button>
    </div>

    <section class="finish-panel" id="finishPanel">
      <h2 class="finish-title">สรุปผลการทำข้อสอบ</h2>
      <p class="finish-text" id="finishText"></p>
    </section>
  </div>

  <script>
    const quizData = [
      {
        q: "Which of the following is controlled air space?",
        choices: [
          "Control area",
          "Danger area",
          "Airway",
          "Both items a) and c) are correct"
        ],
        answer: 3,
        explanation: "Controlled airspace includes controlled areas such as a control area (CTA) and an airway. A danger area is not controlled airspace; it is a special-use airspace where hazardous activities may occur."
      },
      {
        q: "When in flight, the aircraft shall be in compliance with:",
        choices: [
          "VFR",
          "IFR",
          "General rules",
          "General rules and VFR or IFR"
        ],
        answer: 3,
        explanation: "During flight, an aircraft must comply with the general rules of the air and, depending on how the flight is conducted, also comply with either VFR or IFR requirements."
      },
      {
        q: "VFR flights shall not take-off or land at an aerodrome within a control zone when ceiling and ground visibility is less than:",
        choices: [
          "450 m and 5 NM",
          "450 m and 5 km",
          "450 m and 1500 ft",
          "450 ft and 5000 m"
        ],
        answer: 1,
        explanation: "For VFR operations at an aerodrome within a control zone, take-off or landing is not permitted when the ceiling is less than 450 m (1,500 ft) or when the ground visibility is less than 5 km."
      },
      {
        q: "IFR flights shall be flown at:",
        choices: [
          "1000 ft above the highest obstacle",
          "2000 ft above the highest obstacle over high terrain or in mountainous areas",
          "A level which is not below the minimum flight altitude established by the State whose territory is overflown",
          "All of above are correct"
        ],
        answer: 3,
        explanation: "All three statements reflect IFR minimum altitude principles: maintain at least the State-established minimum flight altitude, and where no such altitude exists use the obstacle-clearance criteria, including the higher requirement over mountainous terrain."
      },
      {
        q: "What lights all aircraft in flight at night shall be displayed?",
        choices: [
          "Navigation lights and anti-collision lights",
          "Navigation lights and airframe floodlights",
          "Airframe floodlights and landing lights",
          "Anti-collision lights and landing lights"
        ],
        answer: 0,
        explanation: "At night, aircraft in flight shall display navigation lights and anti-collision lights. Landing lights or floodlights are not universally required for all aircraft in all night-flight situations."
      },
      {
        q: "How long in advance shall a flight plan, for flight to be provided with air traffic control service, be submitted?",
        choices: [
          "At least 10 minutes before the aircraft is estimated to reach the runway in use",
          "At least 30 minutes before departure",
          "At least 60 minutes before departure",
          "At least 90 minutes before departure"
        ],
        answer: 2,
        explanation: "A flight plan for a flight that will receive air traffic control service is generally to be submitted at least 60 minutes before departure, unless filed during flight under the relevant provisions."
      },
      {
        q: "Which of the following is air traffic control service organization?",
        choices: [
          "Control zone, control area and control airspace",
          "Area control service, approach control service and aerodrome control service",
          "Air traffic control service, flight information service and alerting service",
          "All of above are correct"
        ],
        answer: 1,
        explanation: "The three organizations or components of ATC service are area control service, approach control service and aerodrome control service. The other options refer to airspace types or broader ATS groupings."
      },
      {
        q: "What emergency phase corresponds to the aircraft being hijacking?",
        choices: [
          "Uncertainty phase",
          "Alert phase",
          "Distress phase",
          "None of above is correct"
        ],
        answer: 2,
        explanation: "An aircraft subject to unlawful interference is treated as an emergency situation and is generally associated with the distress phase because safety is considered to be under grave and immediate threat."
      },
      {
        q: "What action an aircraft that is being hijacking shall take?",
        choices: [
          "Notify Operator immediately",
          "Notify search and rescue unit immediately",
          "Try to notify the appropriate air traffic service unit",
          "Set transponder to mode A code 7600"
        ],
        answer: 2,
        explanation: "The aircraft should try to notify the appropriate ATS unit of the unlawful interference and significant circumstances. Code 7600 is for radio communication failure, not hijacking; hijacking is associated with 7500."
      },
      {
        q: "A pressure type altimeter calibrated in accordance with the Standard Atmosphere, when set to a pressure of 1013.2 hPa, may be used to indicate:",
        choices: [
          "Altitude",
          "Elevation",
          "Flight levels",
          "Height above the QFE reference datum"
        ],
        answer: 2,
        explanation: "When the altimeter is set to standard pressure 1013.2 hPa, it indicates flight levels, not altitude above mean sea level or height above aerodrome datum."
      },
      {
        q: "Altitude ______",
        choices: [
          "The vertical distance of a level measured from specified datum.",
          "The vertical distance of a level measured from mean sea level.",
          "An airspace extending upwards from the surface of the earth.",
          "An air space extending upwards from the specified limit above the earth."
        ],
        answer: 1,
        explanation: "Altitude is defined as the vertical distance of a level, point or object considered as a point, measured from mean sea level."
      },
      {
        q: "A unit established to provide air traffic control service to aerodrome traffic.",
        choices: [
          "Air traffic advisory service",
          "Approach control service",
          "Aerodrome control service",
          "Aerodrome control tower"
        ],
        answer: 3,
        explanation: "The unit itself is the aerodrome control tower. 'Aerodrome control service' is the service provided, not the physical unit established to provide it."
      },
      {
        q: "The rules of the air shall apply to:",
        choices: [
          "All aircraft in the world",
          "All aircraft in flight only",
          "Aircraft bearing the nationality and registration marks of a Contracting State.",
          "An IFR flight operating in control airspace only"
        ],
        answer: 2,
        explanation: "The rules of the air apply, among other cases, to aircraft bearing the nationality and registration marks of a Contracting State, wherever they may be, subject to local overflight rules."
      },
      {
        q: "Who is responsible for the operation of the aircraft in accordance with the rules of the air?",
        choices: [
          "Appropriate authority",
          "Appropriate ATS authority",
          "Aircraft operating agency",
          "Pilot-in-command of an aircraft"
        ],
        answer: 3,
        explanation: "The pilot-in-command is directly responsible for operating the aircraft in accordance with the rules of the air."
      },
      {
        q: "One of the following is NOT the purpose of the ATS. Which one?",
        choices: [
          "Preventing collisions between aircraft",
          "Preventing collision between aircraft and obstruction",
          "Responsible for the operation and safety of the aircraft during flight",
          "Expediting and maintaining an orderly flow of air traffic"
        ],
        answer: 2,
        explanation: "ATS helps prevent collisions and expedite traffic flow, but it is not responsible for the overall operation and safety of the aircraft during flight; that responsibility remains with the operator and pilot-in-command."
      },
      {
        q: "Which of the following is NOT correct according to the general rules?",
        choices: [
          "Nothing shall be dropped or sprayed from aircraft in flight",
          "IFR flights shall not be operated in visual meteorological conditions",
          "VFR flights shall not be operated at supersonic speed",
          "No person shall pilot an aircraft while under influence of intoxicating liquor"
        ],
        answer: 1,
        explanation: "IFR flights can be operated in visual meteorological conditions; being on an IFR flight plan does not require IMC. Therefore this statement is not correct."
      },
      {
        q: "Which item is correct in the order of right-of-way?",
        choices: [
          "Balloons, airships and gliders",
          "Airships, balloons and gliders",
          "Balloons, gliders and airships",
          "Power-driven heavier-than-air aircraft always has the right of way"
        ],
        answer: 2,
        explanation: "The general order gives the highest priority to balloons, then gliders, then airships, with power-driven heavier-than-air aircraft yielding to them."
      },
      {
        q: "Which of the following is NOT true?",
        choices: [
          "The aircraft that has the right-of-way shall alter its heading to the right.",
          "When two aircraft are approaching-on, each shall alter its heading to the right.",
          "Aircraft shall not be flown in a prohibited area.",
          "Aircraft shall not be flown acrobatically."
        ],
        answer: 0,
        explanation: "The aircraft that has the right-of-way should maintain its heading and speed as far as practicable. It is the other aircraft that must keep out of the way. Therefore option A is not true."
      },
      {
        q: "If the minimum flight altitude has not been established, what shall be the minimum height for IFR flight over mountainous areas?",
        choices: [
          "600 m above the highest obstacle",
          "300 m above the highest obstacle",
          "600 m above the ground",
          "3000 ft above mean sea level"
        ],
        answer: 0,
        explanation: "For IFR flight over mountainous or high terrain, the minimum height is 600 m (2,000 ft) above the highest obstacle within the prescribed distance from the estimated position of the aircraft."
      },
      {
        q: "If an aircraft has a very urgent message to transmit concerning the safety of some person on board, what signal shall be used?",
        choices: [
          "The spoken words MAY DAY sent by radio telephony",
          "The spoken words PAN PAN sent by radio telephony",
          "The repeated switching on and off the landing lights.",
          "The repeating switching on and off the navigation lights"
        ],
        answer: 1,
        explanation: "A very urgent message concerning the safety of a person on board is an urgency message, so the correct radiotelephony signal is PAN PAN. MAYDAY is reserved for distress."
      }
    ];

    const quizEl = document.getElementById("quiz");
    let userAnswers = Array(quizData.length).fill(null);
    let submitted = Array(quizData.length).fill(false);

    function buildQuiz(){
      quizEl.innerHTML = "";
      quizData.forEach((item, index) => {
        const card = document.createElement("section");
        card.className = "card";
        card.innerHTML = `
          <div class="card-head">
            <div>
              <div class="qno">Question ${index + 1}</div>
              <p class="qtext">${item.q}</p>
            </div>
            <div class="point-badge">1 point</div>
          </div>
          <div class="choices">
            ${item.choices.map((choice, cIndex) => `
              <div class="choice">
                <input type="radio" id="q${index}_c${cIndex}" name="q${index}" value="${cIndex}">
                <label for="q${index}_c${cIndex}">
                  <div class="letter">${String.fromCharCode(65 + cIndex)}</div>
                  <div class="choice-text">${choice}</div>
                </label>
              </div>
            `).join("")}
          </div>
          <div class="action-row">
            <button class="primary" onclick="submitAnswer(${index})">ตอบข้อนี้</button>
            <button class="secondary" onclick="showAnswerOnly(${index})">ดูเฉลย</button>
          </div>
          <div class="result" id="result_${index}"></div>
        `;
        quizEl.appendChild(card);
      });
    }

    function submitAnswer(index){
      const selected = document.querySelector(`input[name="q${index}"]:checked`);
      const result = document.getElementById(`result_${index}`);
      if(!selected){
        result.className = "result wrong show";
        result.innerHTML = `
          <div class="result-title">ยังไม่ได้เลือกคำตอบ</div>
          <div class="explain">กรุณาเลือกตัวเลือก A, B, C หรือ D ก่อนกดตอบข้อนี้</div>
        `;
        return;
      }

      userAnswers[index] = Number(selected.value);
      submitted[index] = true;

      const correct = quizData[index].answer === userAnswers[index];
      const correctLetter = String.fromCharCode(65 + quizData[index].answer);
      const yourLetter = String.fromCharCode(65 + userAnswers[index]);

      result.className = `result ${correct ? "correct" : "wrong"} show`;
      result.innerHTML = `
        <div class="result-title">${correct ? "ตอบถูก" : "ตอบผิด"}</div>
        <div class="score-line">คะแนนข้อนี้: ${correct ? "1 / 1" : "0 / 1"}</div>
        <div class="explain">${quizData[index].explanation}</div>
        <div class="answer-line">คำตอบที่ถูกต้อง: ${correctLetter} | คำตอบของคุณ: ${yourLetter}</div>
      `;

      updateStats();
    }

    function showAnswerOnly(index){
      const result = document.getElementById(`result_${index}`);
      submitted[index] = true;
      result.className = "result correct show";
      result.innerHTML = `
        <div class="result-title">เฉลยข้อนี้</div>
        <div class="score-line">คะแนนข้อนี้: ยังไม่คิดคะแนนจนกว่าจะกดตอบ</div>
        <div class="explain">${quizData[index].explanation}</div>
        <div class="answer-line">คำตอบที่ถูกต้อง: ${String.fromCharCode(65 + quizData[index].answer)}</div>
      `;
      updateStats();
    }

    function expandAll(){
      quizData.forEach((_, index) => {
        showAnswerOnly(index);
      });
    }

    function updateStats(){
      const answered = submitted.filter(Boolean).length;
      let correct = 0;
      submitted.forEach((isDone, index) => {
        if(isDone && userAnswers[index] === quizData[index].answer){
          correct++;
        }
      });

      document.getElementById("answeredCount").textContent = answered;
      document.getElementById("correctCount").textContent = correct;
      document.getElementById("totalScore").textContent = correct;
      document.getElementById("accuracy").textContent = answered ? Math.round((correct/answered)*100) + "%" : "0%";

      const finishPanel = document.getElementById("finishPanel");
      const finishText = document.getElementById("finishText");
      if(answered === quizData.length){
        finishPanel.classList.add("show");
        finishText.textContent = `คุณตอบแล้วครบทั้ง 20 ข้อ ได้ ${correct} จาก 20 คะแนน คิดเป็น ${Math.round((correct/quizData.length)*100)}%`;
      } else {
        finishPanel.classList.remove("show");
      }
    }

    function resetQuiz(){
      userAnswers = Array(quizData.length).fill(null);
      submitted = Array(quizData.length).fill(false);
      buildQuiz();
      updateStats();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    buildQuiz();
    updateStats();
  </script>
</body>
</html>
